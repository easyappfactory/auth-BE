# alpha — 알파 서버 (DDL update, 운영에 가까운 쿠키)
spring:
  config:
    activate:
      on-profile: alpha

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

logging:
  level:
    org.hibernate.SQL: info
    org.springframework.orm.jpa: info

app:
  cookie:
    domain: ${APP_COOKIE_DOMAIN}
    secure: true
    same-site: Strict
